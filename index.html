<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Flip Hangman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Top Banner -->
        <div class="top-banner">
            <div class="banner-text">FLIP TO WIN! HANGMAN</div>
        </div>

        <!-- Score & Difficulty Row -->
        <div class="info-row">
            <div class="info-item score-display">
                <span class="info-label">SCORE</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item difficulty-display">
                <span class="info-label">LEVEL</span>
                <span class="info-value" id="difficulty">EASY</span>
            </div>
            <div class="info-item mistakes-display">
                <span class="info-label">MISTAKES</span>
                <span class="info-value" id="mistakes">0 / 6</span>
            </div>
        </div>

        <!-- Main Game Area -->
        <div class="main-area">
            <!-- Left: Word & Letters -->
            <div class="left-panel">
                <!-- Word Slots -->
                <div class="word-slots" id="wordSlots">
                    <div class="slot" data-index="0"></div>
                    <div class="slot" data-index="1"></div>
                    <div class="slot" data-index="2"></div>
                    <div class="slot" data-index="3"></div>
                    <div class="slot" data-index="4"></div>
                </div>

                <!-- Letter Tile Grid -->
                <div class="letter-grid" id="letterGrid">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Character Reveal Board -->
            <div class="right-panel">
                <div class="character-board">
                    <div class="board-title">WHO AM I?</div>
                    <div class="character-area" id="characterArea">
                        <!-- SVG Stick Figure - all parts hidden by default -->
                        <svg viewBox="0 0 120 160" class="hangman-svg" id="hangmanSvg">
                            <!-- Platform -->
                            <line x1="10" y1="150" x2="110" y2="150" stroke="#111" stroke-width="3" stroke-linecap="round"/>
                            <line x1="30" y1="150" x2="30" y2="20" stroke="#111" stroke-width="3" stroke-linecap="round"/>
                            <line x1="30" y1="20" x2="70" y2="20" stroke="#111" stroke-width="3" stroke-linecap="round"/>
                            <line x1="70" y1="20" x2="70" y2="35" stroke="#111" stroke-width="3" stroke-linecap="round"/>
                            <!-- Head -->
                            <circle cx="70" cy="50" r="15" fill="none" stroke="#111" stroke-width="3" id="svgHead" class="hangman-part"/>
                            <!-- Body -->
                            <line x1="70" y1="65" x2="70" y2="105" stroke="#111" stroke-width="3" stroke-linecap="round" id="svgBody" class="hangman-part"/>
                            <!-- Left Arm -->
                            <line x1="70" y1="75" x2="50" y2="95" stroke="#111" stroke-width="3" stroke-linecap="round" id="svgLeftArm" class="hangman-part"/>
                            <!-- Right Arm -->
                            <line x1="70" y1="75" x2="90" y2="95" stroke="#111" stroke-width="3" stroke-linecap="round" id="svgRightArm" class="hangman-part"/>
                            <!-- Left Leg -->
                            <line x1="70" y1="105" x2="50" y2="135" stroke="#111" stroke-width="3" stroke-linecap="round" id="svgLeftLeg" class="hangman-part"/>
                            <!-- Right Leg -->
                            <line x1="70" y1="105" x2="90" y2="135" stroke="#111" stroke-width="3" stroke-linecap="round" id="svgRightLeg" class="hangman-part"/>
                        </svg>
                    </div>
                    <div class="mistakes-counter" id="mistakesCounter">MISTAKES: 0 / 6</div>
                </div>
            </div>
        </div>

        <!-- AI Hint Box -->
        <div class="hint-box" id="hintBox">
            <div class="hint-header">
                <span class="hint-icon">AI</span>
                <span class="hint-title">HINT</span>
            </div>
            <div class="hint-content" id="hintContent">
                Tap a letter to start guessing!
            </div>
        </div>

        <!-- Message Panel -->
        <div class="message-panel" id="messagePanel">
            <div class="message-text" id="messageText">Welcome to AI Flip Hangman!</div>
        </div>

        <!-- Bottom Controls -->
        <div class="controls">
            <button class="control-btn" id="newGameBtn" onclick="startNewGame()">NEW GAME</button>
            <button class="control-btn" id="difficultyBtn" onclick="cycleDifficulty()">CHANGE LEVEL</button>
            <button class="control-btn hint-btn" id="extraHintBtn" onclick="showExtraHint()">EXTRA HINT (-10)</button>
        </div>
    </div>

    <!-- Win/Lose Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-content" id="overlayContent">
            <div class="overlay-title" id="overlayTitle">YOU WIN!</div>
            <div class="overlay-word" id="overlayWord">APPLE</div>
            <div class="overlay-meaning" id="overlayMeaning">A round fruit with red, green, or yellow skin.</div>
            <div class="overlay-example" id="overlayExample">"I eat an apple every morning."</div>
            <div class="overlay-score">
                <span>Final Score: </span><span id="overlayScore">0</span>
            </div>
            <button class="control-btn overlay-btn" onclick="startNewGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
